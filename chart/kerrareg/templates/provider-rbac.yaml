{{- if and .Values.provider.enabled .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ if .Values.rbac.scopeToNamespace }}Role{{ else }}ClusterRole{{ end }}
metadata:
  name: provider-controller-role
  {{- if .Values.rbac.scopeToNamespace }}
  namespace: {{ .Values.global.namespace }}
  {{- end }}
rules:
- apiGroups:
  - kerrareg.io
  resources:
  - providers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kerrareg.io
  resources:
  - providers/finalizers
  verbs:
  - update
- apiGroups:
  - kerrareg.io
  resources:
  - providers/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - kerrareg.io
  resources:
  - versions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ if .Values.rbac.scopeToNamespace }}RoleBinding{{ else }}ClusterRoleBinding{{ end }}
metadata:
  name: provider-controller-role-binding
  {{- if .Values.rbac.scopeToNamespace }}
  namespace: {{ .Values.global.namespace }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ if .Values.rbac.scopeToNamespace }}Role{{ else }}ClusterRole{{ end }}
  name: provider-controller-role
subjects:
- kind: ServiceAccount
  name: provider-controller
  namespace: {{ .Values.global.namespace }}
{{- end }}
