site_name: Kerrareg
site_description: Self-hosted OpenTofu/Terraform Module and Provider Registry for Kubernetes
site_url: https://tonedefdev.github.io/kerrareg/docs
repo_url: https://github.com/tonedefdev/kerrareg
repo_name: tonedefdev/kerrareg
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  logo: img/kerrareg.svg
  favicon: img/kerrareg.svg
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Local Quickstart: getting-started/quickstart.md
  - Architecture: architecture.md
  - Storage Backends: storage.md
  - Configuration:
    - Namespace-Scoped Mode: configuration/namespace.md
    - GitHub Authentication: configuration/github-auth.md
    - TLS: configuration/tls.md
    - GPG Signing: configuration/gpg.md
  - Guides:
    - GitOps with Argo CD: guides/gitops.md
    - Depot (Pull-Based): guides/depot.md
    - CI/CD (Push-Based): guides/cicd.md
    - Consuming Modules: guides/modules.md
    - Consuming Providers: guides/providers.md
    - Migrating to Kerrareg: guides/migration.md
  - Authentication: authentication.md
  - Kubernetes RBAC: rbac.md
  - Reference:
    - API: reference/api.md
    - Version Constraints: reference/version-constraints.md
  - Contributing: contributing.md
  - Helm Chart: helm-chart.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
