apiVersion: v1
kind: ServiceAccount
metadata:
  name: kerrareg-portal
  namespace: kerrareg-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kerrareg-portal-readonly
  namespace: kerrareg-system
rules:
  - apiGroups: ["kerrareg.io"]
    resources: ["depots", "modules", "versions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kerrareg-portal-readonly
  namespace: kerrareg-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kerrareg-portal-readonly
subjects:
  - kind: ServiceAccount
    name: kerrareg-portal
    namespace: kerrareg-system
