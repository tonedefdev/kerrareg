name: E2E Tests
description: Run end-to-end tests for Kerrareg controllers on pull requests.

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  e2e-module:
    name: Module controller e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.0"

      - name: Create kind cluster
        run: kind create cluster --name kind

      - name: Run module e2e tests
        working-directory: services/module
        run: IMG=module-controller:e2e-test go test ./test/e2e/ -v -count=1 -timeout 20m

  e2e-provider:
    name: Provider controller e2e
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.0"

      - name: Create kind cluster
        run: kind create cluster --name kind

      - name: Run provider e2e tests
        working-directory: services/provider
        run: IMG=provider-controller:e2e-test go test ./test/e2e/ -v -count=1 -timeout 30m

  e2e-depot:
    name: Depot controller e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Create kind cluster
        run: kind create cluster --name kind

      - name: Run depot e2e tests
        working-directory: services/depot
        run: IMG=depot-controller:e2e-test go test ./test/e2e/ -v -count=1 -timeout 20m
